name: neom_profile
description: Profile Details for Open Neom.
version: 2.0.1
homepage: https://github.com/Open-Neom/neom_profile
publish_to: 'none'

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  neom_core:
    git:
      url: git@github.com:Open-Neom/neom_core.git
  neom_commons:
    git:
      url: git@github.com:Open-Neom/neom_commons.git
  neom_home:
    path: ../neom_home
  neom_achievements:
    path: ../neom_achievements
  saia_core:
    path: ../../ai/saia_core
  neom_forum:
    path: ../neom_forum
  neom_memory:
    path: ../../ai/neom_memory
  hive_flutter: ^1.1.0
  cloud_firestore: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

dependency_overrides:
